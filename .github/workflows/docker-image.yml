name: Build & Push User Image
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: xingwei02
          password: ${{ secrets.DOCKER_TOKEN }}
          # 加在登录步骤的上面，用来调试
      - name: Debug Secrets
        run: echo "DOCKER_TOKEN length: ${{ secrets.DOCKER_TOKEN | length }}"
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            xingwei02/dujiao-next-user:latest
            xingwei02/dujiao-next-user:affiliate-v1
            xingwei02/dujiao-next-user:${{ github.sha }}
